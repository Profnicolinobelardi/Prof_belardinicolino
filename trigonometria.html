<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trigonometria | Matematica Prof. Belardi</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .pdf-container {
      width: 100%;
      height: 75vh;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: #fff;
    }
    
    .tabs-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 25px;
      justify-content: center;
    }
    
    .tab-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 8px;
      color: #e2e8f0;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }
    
    .tab-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      border-color: #8b5cf6;
      color: #fff;
    }
    
    .tab-btn.active {
      background: #8b5cf6;
      border-color: #8b5cf6;
      color: #fff;
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.4);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div style="display:flex; align-items:center;"><a href="index.html" class="nav-brand">Portale Didattico <span style="color: #fff; font-size: 0.8rem; display:block;">Prof. Belardi Nicolino</span></a> <button onclick="window.location.href='login.html'" style="margin-left:15px; background:rgba(239,68,68,0.2); border:1px solid #ef4444; color:#fff; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:0.85rem; font-weight:600; display:inline-flex; align-items:center; transition:all 0.3s;" onmouseover="this.style.background='#ef4444'" onmouseout="this.style.background='rgba(239,68,68,0.2)'">&#128273; Area Docenti</button></div>
    <div class="nav-links">
      <a href="index.html">🏠 Portale</a>
      <a href="matematica.html">Matematica</a>
      <a href="trigonometria.html" class="active">Trigonometria</a>
    </div>
  </nav>

  <div class="container" style="max-width: 1100px;">
    <div class="header-section">
      <h1>Corso di Trigonometria</h1>
      <p>Esplora il materiale didattico cliccando sulle 5 schede qui sotto. I documenti PDF si visualizzeranno in basso.</p>
    </div>

    <!-- Le 5 Schede -->
    <div class="tabs-container">
      <button class="tab-btn active" onclick="loadPdf('basi di trigonometria.pdf', this)">Basi Trigonometria</button>
      <button class="tab-btn" onclick="loadPdf('Angoli associati.pdf', this)">Angoli Associati</button>
      <button class="tab-btn" onclick="loadPdf('esercizi trigonometria.pdf', this)">Esercizi Trigonometria</button>
      <button class="tab-btn" onclick="loadPdf('EQUAZIONI GONIOMETRICHE.pdf', this)">Equazioni Goniometriche</button>
      <button class="tab-btn" onclick="loadPdf('altri teoremi trigonometria.pdf', this)">Altri Teoremi Trigonometria</button>
    </div>

    <!-- Contenitore Immersivo PDF -->
    <div class="pdf-container">
      <!-- Il file visualizzato di default all'avvio -->
      <embed id="pdfView" src="basi di trigonometria.pdf" type="application/pdf" width="100%" height="100%" />
    </div>
  </div>

  <script>
    // Funzione per cambiare dinamicamente il PDF e il bottone evidenziato
    function loadPdf(pdfName, btnElement) {
      // Rimuovi la classe active da tutti i bottoni
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      // Aggiungila solo al bottone cliccato
      btnElement.classList.add('active');
      
      // Imposta il percorso del nuovo PDF (caricato nella root del sito)
      document.getElementById('pdfView').src = pdfName;
    }
  </script>
</body>
</html>
